apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pestapora-web
  namespace: pestapora
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pestapora-web
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 4
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 30
